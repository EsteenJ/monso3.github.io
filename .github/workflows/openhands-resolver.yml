name: Resolve Issue with OpenHands
on:
  issues:
    types: [opened, labeled]
  issue_comment:
    types: [created]

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  resolve-issue:
    runs-on: ubuntu-latest
    if: github.event_name == 'issues' || contains(github.event.comment.body, '@openhands-agent')
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run OpenHands Resolver
        uses: all-hands-ai/openhands-resolver-action@main
        env:
          GITHUB_TOKEN: ${{ secrets.PAT }}
          LLM_API_KEY: ${{ secrets.LLM_API_KEY }}